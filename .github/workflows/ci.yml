name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      TESTING: "1"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REGISTRY: ghcr.io
      IMAGE_NAME: greenbin-app
      PYTHONPATH: .
      OWNER_LC: ${{ github.repository_owner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install dependencies
      run: |
        pip install --upgrade "pip>=24.0"
        pip install -r requirements.txt
        pip install pytest flake8 bandit pip-audit pytest-cov

    - name: Run lint
      run: |
        flake8 . | tee flake8-report.txt

    - name: Upload lint report
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: flake8-report.txt

    - name: Run security scan (Bandit)
      run: |
        bandit -r . -ll -s B104 -f txt -o bandit-report.txt || true

    - name: Show Bandit report
      run: cat bandit-report.txt

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.txt

    - name: Run dependency scan
      run: pip-audit --format=json --output=pip-audit-report.json

    - name: Upload pip-audit report
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        path: pip-audit-report.json
    
    - name: Run tests with coverage + report
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html --junitxml=results.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: results.xml

    - name: HTML check (basic)
      continue-on-error: true
      run: |
        pip install html5validator
        html5validator --ignore-re '.*templates.*'

    - name: Set lowercase owner 
      run: echo "OWNER_LC=${OWNER_LC,,}" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set image name
      run: echo "IMAGE=$REGISTRY/$OWNER_LC/$IMAGE_NAME" >> $GITHUB_ENV
  
    - name: Extract version
      id: vars
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build Docker image
      run: |
        docker build \
          --build-arg REPO_URL=https://github.com/${{ github.repository }} \
          -t $IMAGE:${{ steps.vars.outputs.VERSION }} .
        
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          docker tag $IMAGE:${{ steps.vars.outputs.VERSION }} $IMAGE:latest
        fi

    - name: Scan Docker image (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE }}:${{ steps.vars.outputs.VERSION }}
        format: table
        exit-code: 0
        severity: CRITICAL,HIGH

    - name: Push Docker image
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        docker push $IMAGE:${{ steps.vars.outputs.VERSION }}
        docker push $IMAGE:latest