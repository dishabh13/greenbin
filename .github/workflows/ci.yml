name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      TESTING: "1"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REGISTRY: ghcr.io
      IMAGE_NAME: greenbin-app
      PYTHONPATH: .
      OWNER_LC: ${{ github.repository_owner }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install venv support
      run: sudo apt-get update && sudo apt-get install -y python3-venv

    - name: Create venv and install dependencies
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 bandit pip-audit pytest-cov html5validator

    - name: Run lint
      run: source .venv/bin/activate && flake8 . | tee flake8-report.txt

    - name: Upload lint report
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: flake8-report.txt

    - name: Run security scan (Bandit)
      run: |
        source .venv/bin/activate
        bandit -r . -ll -f json -o bandit-report.json || true
      shell: bash

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

    - name: Run dependency scan
      run: source .venv/bin/activate && pip-audit --format=json > pip-audit-report.json || true

    - name: Upload pip-audit report
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        path: pip-audit-report.json

    - name: Run tests with coverage
      run: source .venv/bin/activate && pytest --cov=. --cov-report=xml --cov-report=html --junitxml=results.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: results.xml

    - name: HTML check (basic)
      run: |
        source .venv/bin/activate
        html5validator --root templates --ignore "Attribute .* not allowed on element .* at step ." || true
      shell: bash

    - name: Set lowercase owner
      run: echo "OWNER_LC=${OWNER_LC,,}" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set image name
      run: echo "IMAGE=$REGISTRY/$OWNER_LC/$IMAGE_NAME" >> $GITHUB_ENV

    - name: Extract version
      id: vars
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build Docker image
      run: |
        docker build \
          --build-arg REPO_URL=https://github.com/${{ github.repository }} \
          -t $IMAGE:${{ steps.vars.outputs.VERSION }} .
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          docker tag $IMAGE:${{ steps.vars.outputs.VERSION }} $IMAGE:latest
        fi

    - name: Scan Docker image (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE }}:${{ steps.vars.outputs.VERSION }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: 0

    - name: Push Docker image
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        docker push $IMAGE:${{ steps.vars.outputs.VERSION }}
        docker push $IMAGE:latest
