name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      TESTING: "1"
      REGISTRY: ghcr.io
      IMAGE_NAME: greenbin-app

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8 bandit pip-audit

    - name: Run lint
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run security scan (Bandit)
      run: bandit -r .

    - name: Run dependency scan
      run: pip-audit

    - name: Run tests
      run: pytest

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: vars
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build Docker image
      run: |
        docker build -t $REGISTRY/${{ github.actor }}/$IMAGE_NAME:${{ steps.vars.outputs.VERSION }} .
        docker tag $REGISTRY/${{ github.actor }}/$IMAGE_NAME:${{ steps.vars.outputs.VERSION }} \
                    $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest

    - name: Push Docker image
      run: |
        docker push $REGISTRY/${{ github.actor }}/$IMAGE_NAME:${{ steps.vars.outputs.VERSION }}
        docker push $REGISTRY/${{ github.actor }}/$IMAGE_NAME:latest