name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      TESTING: "1"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REGISTRY: ghcr.io
      IMAGE_NAME: greenbin-app

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==25.0.1
        pip install -r requirements.txt
        pip install pytest flake8 bandit pip-audit

    - name: Run lint
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run security scan (Bandit)
      run: bandit -r . -ll -s B104

    - name: Run dependency scan
      run: pip-audit --ignore-vuln CVE-2026-3219 || true
    
    - name: Init DB for tests
      run: python -c "from app import init_db; init_db()"

    - name: Run tests
      run: pytest
    
    - name: Set lowercase owner
      run: echo "OWNER_LC=$(echo $GITHUB_REPOSITORY_OWNER | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        logout: true
    
    - name: Set image name
      run: echo "IMAGE=$REGISTRY/$OWNER_LC/$IMAGE_NAME" >> $GITHUB_ENV
  
    - name: Extract version
      id: vars
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest" >> $GITHUB_OUTPUT
        fi

    - name: Build Docker image
      run: |
        docker build -t $IMAGE:${{ steps.vars.outputs.VERSION }} .
        docker tag $IMAGE:${{ steps.vars.outputs.VERSION }} $IMAGE:latest

    - name: Push Docker image
      run: |
        docker push $IMAGE:${{ steps.vars.outputs.VERSION }}
        docker push $IMAGE:latest