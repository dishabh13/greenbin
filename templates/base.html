<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GREENBIN{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #f4f7f5;
      --bg-accent: #ecf4ef;
      --surface: #ffffff;
      --surface-strong: #f8fbf9;
      --card: #ffffff;
      --soft: #f2f6f4;
      --txt: #1b2b24;
      --muted: #5f7469;
      --accent: #1f7a4f;
      --accent-strong: #175f3d;
      --accent-soft: #e8f4ed;
      --border: rgba(27, 43, 36, .10);
      --shadow: 0 16px 40px rgba(28, 44, 36, .08);
      --warn: #d97706;
      --danger: #dc2626;
      --info: #2563eb;
      --success: #1f7a4f;
      --r: 16px;
    }
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: 
        radial-gradient(circle at top left, rgba(31, 122, 79, .08), transparent 28%),
        radial-gradient(circle at top right, rgba(37, 99, 235, .06), transparent 24%),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
      color: var(--txt);
      min-height: 100vh;
    }
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: -.03em;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .55rem;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: .9rem;
      flex-wrap: wrap;
    }
    .role-pill {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: .24rem .72rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(31, 122, 79, .15);
    }
    .btn-nav {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .42rem .9rem;
      border-radius: 10px;
      font-size: .82rem;
      cursor: pointer;
      transition: .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }
    .btn-nav:hover {
      border-color: rgba(220, 38, 38, .22);
      color: var(--danger);
      background: #fff7f7;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2.5rem;
    }
    .pg-head {
      margin-bottom: 1.75rem;
    }
    .pg-head h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .pg-head p {
      color: var(--muted);
      margin-top: .3rem;
      font-size: .94rem;
      max-width: 760px;
      line-height: 1.55;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }
    .card-hd {
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .96rem;
      display: flex;
      align-items: center;
      gap: .55rem;
    }
    .card-bd {
      padding: 1.4rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .stat {
      background: linear-gradient(180deg, var(--surface), var(--surface-strong));
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.1rem 1.3rem;
      transition: .2s;
      box-shadow: var(--shadow);
    }
    .stat:hover {
      transform: translateY(-2px);
    }
    .stat-lbl {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-ico {
      font-size: 1.15rem;
      margin-bottom: .3rem;
      color: var(--accent);
    }
    .bins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.1rem;
    }
    .bin-card {
      background: linear-gradient(180deg, var(--surface), var(--surface-strong));
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.2rem;
      transition: .25s;
      box-shadow: var(--shadow);
    }
    .bin-card:hover {
      transform: translateY(-3px);
    }
    .bin-card.bc-danger {
      border-color: rgba(220, 38, 38, .25);
    }
    .bin-card.bc-warning {
      border-color: rgba(217, 119, 6, .25);
    }
    .bin-hd {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: .9rem;
    }
    .bin-loc {
      font-weight: 700;
      font-size: .94rem;
      line-height: 1.3;
    }
    .bin-sub {
      font-size: .74rem;
      color: var(--muted);
      margin-top: .18rem;
    }
    .bar-bg {
      background: #e7eeea;
      border-radius: 999px;
      height: 10px;
      margin: .85rem 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .5s ease;
    }
    .bf-success {
      background: linear-gradient(90deg, #1f7a4f, #4ea672);
    }
    .bf-info {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }
    .bf-warning {
      background: linear-gradient(90deg, #d97706, #f59e0b);
    }
    .bf-danger {
      background: linear-gradient(90deg, #dc2626, #f87171);
    }
    .bin-meta {
      display: flex;
      justify-content: space-between;
      font-size: .79rem;
      color: var(--muted);
    }
    .bin-acts {
      margin-top: .9rem;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .badge {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: .22rem .6rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .bg-success {
      background: #e8f4ed;
      color: var(--success);
      border: 1px solid rgba(31, 122, 79, .16);
    }
    .bg-info {
      background: #eef4ff;
      color: var(--info);
      border: 1px solid rgba(37, 99, 235, .14);
    }
    .bg-warning {
      background: #fff5e8;
      color: var(--warn);
      border: 1px solid rgba(217, 119, 6, .16);
    }
    .bg-danger {
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, .14);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .38rem;
      padding: .52rem 1rem;
      border-radius: 10px;
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: .2s;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
    }
    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .btn-accent {
      background: var(--accent);
      color: #fff;
    }
    .btn-accent:hover:not(:disabled) {
      background: var(--accent-strong);
    }
    .btn-primary {
      background: #1d4ed8;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #1e40af;
    }
    .btn-danger {
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, .14);
    }
    .btn-danger:hover:not(:disabled) {
      background: #ffe6e6;
    }
    .btn-outline {
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) {
      border-color: rgba(31, 122, 79, .24);
      color: var(--accent);
    }
    .btn-sm {
      padding: .32rem .72rem;
      font-size: .78rem;
    }
    .btn-full {
      width: 100%;
      justify-content: center;
    }
    .fg {
      margin-bottom: .9rem;
    }
    label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .38rem;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    input, select, textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .68rem .9rem;
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      transition: .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(31, 122, 79, .35);
      box-shadow: 0 0 0 4px rgba(31, 122, 79, .08);
    }
    select option {
      background: #fff;
      color: var(--txt);
    }
    textarea {
      resize: vertical;
      min-height: 70px;
    }
    .tbl-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
    }
    thead th {
      padding: .72rem .95rem;
      text-align: left;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: .76rem .95rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:hover {
      background: #f8fbf9;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    .flash {
      padding: .8rem 1.05rem;
      border-radius: 12px;
      margin-bottom: .95rem;
      font-size: .88rem;
      display: flex;
      align-items: center;
      gap: .55rem;
      border: 1px solid;
    }
    .fl-success {
      background: #edf8f0;
      border-color: rgba(31, 122, 79, .15);
      color: var(--success);
    }
    .fl-danger {
      background: #fff3f3;
      border-color: rgba(220, 38, 38, .15);
      color: var(--danger);
    }
    .fl-info {
      background: #eef4ff;
      border-color: rgba(37, 99, 235, .14);
      color: var(--info);
    }
    .fl-warning {
      background: #fff8eb;
      border-color: rgba(217, 119, 6, .16);
      color: var(--warn);
    }
    .alert-banner {
      background: #fff5f5;
      border: 1px solid rgba(220, 38, 38, .14);
      border-radius: var(--r);
      padding: .95rem 1.2rem;
      margin-bottom: 1.5rem;
    }
    .ab-hd {
      display: flex;
      align-items: center;
      gap: .45rem;
      color: var(--danger);
      font-weight: 700;
      margin-bottom: .45rem;
    }
    .ab-item {
      font-size: .83rem;
      color: #8f3a3a;
      padding: .25rem 0;
      border-bottom: 1px solid rgba(220, 38, 38, .08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ab-item:last-child {
      border-bottom: none;
    }
    .pdot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: .4rem;
    }
    .pdot-danger {
      background: #dc2626;
    }
    .pdot-warning {
      background: #d97706;
    }
    .pdot-info {
      background: #2563eb;
    }
    .pdot-success {
      background: #1f7a4f;
    }
    .route-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: .8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
    }
    /* text colors */
    .text-danger { color: #f87171; }
    .text-warning { color: #fbbf24; }
    .text-success { color: #4dc462; }

    /* bar fill colors */
    .bf-undefined { background: #e7eeea; }
    .bf-danger { background: linear-gradient(90deg, #f87171, #fca5a5); }
    .bf-warning { background: linear-gradient(90deg, #fbbf24, #fcd34d); }
    .bf-info { background: linear-gradient(90deg, #2563eb, #60a5fa); }
    .bf-success { background: linear-gradient(90deg, #1f7a4f, #4ea672); }
    .cb-fill {
      min-width: 0;
    }
    .cb-fill.non-zero {
      min-width: 22px;
    }
    .trip-chip-warning {
      background: #d97706;
    }
    .trip-chip-info {
      background: #2563eb;
    }
    .trip-chip-success {
      background: #1f7a4f;
    }
    .trip-chip {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-top: .18rem;
    }

    .trip-chip-danger {
      background: #dc2626;
    }
    .card-danger,
    .card-warning,
    .card-info,
    .card-success {
      border-left-width: 4px;
      border-left-style: solid;
    }

    .card-danger {
      border-left-color: #ef4444;
    }
    .card-warning {
      border-left-color: #fbbf24;
    }
    .card-info {
      border-left-color: #3b82f6;
    }
    .card-success {
      border-left-color: #22c55e;
    }
  </style>
  </head>
<body>

<nav class="nav">
  <a href="#" class="nav-brand">GREENBIN</a>
  <div class="nav-right">
    {% block nav %}{% endblock %}
  </div>
</nav>

<div class="wrap">
  {% block content %}{% endblock %}
</div>

</body>
</html>
